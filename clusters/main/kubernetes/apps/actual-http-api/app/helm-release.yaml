apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: actual-http-api
    namespace: actual-http-api
spec:
    interval: 15m
    chart:
        spec:
            chart: custom-app
            version: 13.0.8
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: actual-http-api
    values:
        image:
            repository: jhonderson/actual-http-api
            tag: latest
        ingress:
            main:
                enabled: true
                hosts:
                    - host: actual-http-api.${DOMAIN_0}
                      paths:
                        - path: /
                          pathType: Prefix
        service:
            main:
                enabled: true
                ports:
                    main:
                        enabled: true
                        port: 5007
                        protocol: http
                        targetPort: 5007
                type: ClusterIP
        workload:
            main:
                podSpec:
                    containers:
                        main:
                            env:
                                ACTUAL_SERVER_PASSWORD:
                                    name: ACTUAL_SERVER_PASSWORD
                                    value: ${ACTUAL_SERVER_PASSWORD}
                                ACTUAL_SERVER_URL:
                                    name: ACTUAL_SERVER_URL
                                    value: ${ACTUAL_SERVER_URL}
                                API_KEY:
                                    name: API_KEY
                                    value: ${ACTUAL_API_KEY}
