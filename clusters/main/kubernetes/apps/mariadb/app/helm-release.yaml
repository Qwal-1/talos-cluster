apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: mariadb
    namespace: mariadb
spec:
    interval: 15m
    chart:
        spec:
            chart: mariadb
            version: 14.0.12
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: mariadb
    values:
        mariadbDatabase: ${MARIADB_DB}
        mariadbUsername: ${MARIADB_USERNAME}
        password: ${MARIADB_ROOT_PASSWORD}
        rootPassword: ${MARIADB_ROOT_PASSWORD}

        service:
          main:
            type: LoadBalancer
        #ingress:
        #    main:
        #        enabled: true
        #        hosts:
        #            - host: mariadb.${DOMAIN_0}

