apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: hoshinova
    namespace: media
spec:
    interval: 15m
    chart:
        spec:
            chart: app-template
            version: 14.2.2
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: hoshinova
    values:
        image:
            repository: ghcr.io/holoarchivists/hoshinova
            tag: main
        ingress:
            main:
                enabled: true
                hosts:
                    - host: ytlive.${DOMAIN_0}
                      paths:
                        - path: /
                          pathType: Prefix
        service:
            main:
                enabled: true
                ports:
                    main:
                        enabled: true
                        port: 9104
                        protocol: http
                        targetPort: 1104
                type: ClusterIP
        persistence:
            videos:
                enabled: true
                path: /mnt/main_vault/media/YouTube/livestream
                mountPath: /app/videos
                server: ${TRUENAS_IP}
                type: nfs
            temp:
                enabled: true
                mountPath: /app/temp
                type: pvc
            configmap-vol:
                enabled: true
                type: configmap
                objectName: hoshinova-config-toml
                expandObjectName: false
                optional: false
                defaultMode: "0777"
                mountPath: /app/
                items:
                  - key: config.toml
                    path: config.toml
