apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: hoshinova
    namespace: media
spec:
    interval: 15m
    chart:
        spec:
            chart: app-template
            version: 14.2.2
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: hoshinova
    values:
        image:
            repository: alpine
            tag: latest
            command: ["/bin/sh", "-c", "sleep 3600"]  # Keeps the container running
        livenessProbe:
            exec:
                command:
                    - "sh"
                    - "-c"
                    - "echo ok"  # Replace with a meaningful command
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
            successThreshold: 1
        readinessProbe:
            exec:
                command:
                    - "sh"
                    - "-c"
                    - "echo ok"  # Replace with a meaningful command
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 4
            successThreshold: 2
        startupProbe:
            exec:
                command:
                    - "sh"
                    - "-c"
                    - "echo ok"  # Replace with a meaningful command
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 5