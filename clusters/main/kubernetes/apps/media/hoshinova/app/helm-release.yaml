apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: hoshinova
    namespace: media
spec:
    interval: 15m
    chart:
        spec:
            chart: app-template
            version: 14.2.2
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: hoshinova
    values:
        image:
            repository: nginx
            tag: latest
        service:
            service-clusterip:
                default-port:
                    enabled: true
                    port: 80
                    protocol: http
                    targetPort: 80
                    type: ClusterIP