apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: profilarr
    namespace: media
spec:
    interval: 15m
    chart:
        spec:
            chart: app-template
            version: 18.8.3
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: profilarr
    values:
        image:
            repository: ghcr.io/dictionarry-hub/profilarr
            tag: 2.0.8
        credentials:
            s3:
                accessKey: ${BACKUP_S3_ACCESS_KEY}
                bucket: ${BACKUP_S3_BUCKET}
                encrKey: ${BACKUP_RESTIC_PASSWORD}
                secretKey: ${BACKUP_S3_SECRET_KEY}
                type: s3
                url: ${BACKUP_S3_ENDPOINT}
        service:
            main:
                ports:
                    main:
                        protocol: http
                        targetPort: 6868
                        port: 6868
        ingress:
            main:
                enabled: true
                ingressClassName: internal
                annotations:
                    nginx.ingress.kubernetes.io/auth-method: 'GET'
                    nginx.ingress.kubernetes.io/auth-url: 'http://authelia.authelia.svc.cluster.local:9091/api/verify'
                    nginx.ingress.kubernetes.io/auth-signin: 'https://auth.${DOMAIN_0}?rm=$request_method'
                    nginx.ingress.kubernetes.io/auth-response-headers: 'Remote-User,Remote-Name,Remote-Groups,Remote-Email'
                hosts:
                    - host: profilarr.${DOMAIN_0}
                      paths:
                        - path: /
                          pathType: Prefix
                integrations:
                    homepage:
                        description: "Configuration Management Platform for Radarr/Sonarr"
                        enabled: true
                        group: Media Management
                        icon: "profilarr"
                        name: "ProfiLarr"
                        widget:
                            enabled: false
        workload:
            main:
                podSpec:
                    containers:
                        main:
                            env:
                                AUTH: oidc
                                OIDC_DISCOVERY_URL: https://auth.${DOMAIN_0}/.well-known/openid-configuration
                                OIDC_CLIENT_ID: profilarr
                                OIDC_CLIENT_SECRET: ${OIDC_PROFILARR_INSECURE_SECRET}
                                ORIGIN: https://profilarr.${DOMAIN_0}
        persistence:
            config:
                enabled: true
                mountPath: "/config"
                volsync:
                    - credentials: s3
                      type: restic
                      name: config
                      dest:
                        enabled: false
                      src:
                        enabled: true
                        trigger:
                          schedule: 5 1 * * *
        securityContext:
            container:
                runAsNonRoot: false
                readOnlyRootFilesystem: false
                runAsUser: 0
                runAsGroup: 0
