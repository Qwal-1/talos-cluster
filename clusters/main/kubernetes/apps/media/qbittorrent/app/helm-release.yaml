apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: qbittorrent
    namespace: qbittorrent
spec:
    interval: 15m
    chart:
        spec:
            chart: qbittorrent
            version: 20.0.11
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: qbittorrent
    values:
        credentials:
            ${MINIO_NAME}:
                accessKey: ${MINIO_ACCESSKEY}
                bucket: ${MINIO_BUCKET}
                encrKey: ${MINIO_ENCRKEY}
                name: ${MINIO_NAME}
                path: ${MINIO_PATH}
                secretKey: ${MINIO_SECRETKEY}
                type: ${MINIO_TYPE}
                url: ${MINIO_URL}
        ingress:
            main:
                enabled: true
                hosts:
                    - host: qbit.${DOMAIN}
                      paths:
                        - path: /
                          pathType: Prefix
        persistence:
            config:
                volsync:
                    - credentials: minio
                      type: restic
                      name: config
                      dest:
                        enabled: true
                      src:
                        enabled: true
            downloads:
                enabled: true
                existingClaim: media-nfs-pvc
                mountPath: "/media"
        service:
        torrent:
            loadBalancerIP: ${TRAEFIK_IP}
