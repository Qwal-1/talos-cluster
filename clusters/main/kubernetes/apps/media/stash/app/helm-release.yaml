apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: stash
    namespace: media
spec:
    interval: 15m
    chart:
        spec:
            chart: stash
            version: 16.0.8
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: stash
    values:
        credentials:
            minio:
                accessKey: ${MINIO_ACCESSKEY}
                bucket: ${MINIO_BUCKET}
                encrKey: ${MINIO_ENCRKEY}
                secretKey: ${MINIO_SECRETKEY}
                type: s3
                url: ${MINIO_URL}
        ingress:
            main:
                enabled: true
                hosts:
                    - host: stash.${DOMAIN_0}
                      paths:
                        - path: /
                          pathType: Prefix
        persistence:
            blobs:
                enabled: true
                mountPath: /blobs
                readOnly: false
                storageClass: ""
                volsync:
                    - credentials: minio
                      dest:
                        enabled: false
                      name: config
                      src:
                        enabled: true
                      type: restic
            cache:
                enabled: true
                mountPath: /cache
                readOnly: false
                storageClass: ""
                volsync:
                    - credentials: minio
                      dest:
                        enabled: false
                      name: config
                      src:
                        enabled: true
                      type: restic
            config:
                enabled: true
                mountPath: /root/.stash
                readOnly: false
                storageClass: ""
                volsync:
                    - credentials: minio
                      dest:
                        enabled: false
                      name: config
                      src:
                        enabled: true
                      type: restic
            data:
                enabled: true
                mountPath: /data
                readOnly: false
                storageClass: ""
                volsync:
                    - credentials: minio
                      dest:
                        enabled: false
                      name: config
                      src:
                        enabled: true
                      type: restic
            generated:
                enabled: true
                mountPath: /generated
                readOnly: false
                storageClass: ""
                volsync:
                    - credentials: minio
                      dest:
                        enabled: false
                      name: config
                      src:
                        enabled: true
                      type: restic
            metadata:
                enabled: true
                mountPath: /metadata
                readOnly: false
                storageClass: ""
                volsync:
                    - credentials: minio
                      dest:
                        enabled: false
                      name: config
                      src:
                        enabled: true
                      type: restic
            media:
                enabled: true
                existingClaim: media-nfs-pvc
                mountPath: "/media"