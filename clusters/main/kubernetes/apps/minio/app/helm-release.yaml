apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: minio
    namespace: minio
spec:
    interval: 15m
    chart:
        spec:
            chart: minio
            version: 13.7.4
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: minio
    value:
      global:
        stopAll: true
      ingress:
          main:
              enabled: true
              hosts:
                  - host: minio.${DOMAIN_0}
                    paths:
                      - path: /
                        pathType: Prefix