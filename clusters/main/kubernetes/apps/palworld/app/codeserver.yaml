apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: code-server
  namespace: palworld
spec:
  interval: 15m
  chart:
    spec:
      chart: code-server
      version: 15.13.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: code-server
  values:
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: pal-codeserver.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
    persistence:
      serverfiles:
        enabled: true
        existingClaim: palworld-app-template-palworld
        mountPath: /palworld