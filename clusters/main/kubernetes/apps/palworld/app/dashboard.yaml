apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld-dashboard
  namespace: palworld
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.14.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system

  releaseName: palworld-dashboard

  values:
    image:
      repository: ghcr.io/rnz01/palworld-server-dashboard
      tag: latest
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                NODE_ENV: production
                HOSTNAME: 0.0.0.0
                PORT: "3000"

                PANEL_AUTH_FILE: /app/data/panel-auth.json
                PANEL_INITIAL_ADMIN_PASSWORD: "${PALWORLD_DASHBOARD_PASSWORD}"

                PALWORLD_REST_URL: http://palworld-app-template-api:8212
                PALWORLD_ADMIN_PASSWORD: "${PALWORLD_ADMIN_PASSWORD}"

              probes:
                startup:
                  enabled: false

                readiness:
                  enabled: true
                  type: http
                  path: /
                  port: 3000

                liveness:
                  enabled: true
                  type: http
                  path: /
                  port: 3000

              resources:
                limits:
                  cpu: 1
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 256Mi

    service:
      main:
        enabled: true
        type: ClusterIP
        ports:
          main:
            enabled: true
            port: 3000
            targetPort: 3000
            protocol: http

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        annotations:
          nginx.ingress.kubernetes.io/auth-method: "GET"
          nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local:9091/api/verify"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.${DOMAIN_0}?rm=$request_method"
          nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Groups,Remote-Email"
        hosts:
          - host: pal-admin.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix

    persistence:
      data:
        enabled: true
        size: 2Gi
        mountPath: /app/data
