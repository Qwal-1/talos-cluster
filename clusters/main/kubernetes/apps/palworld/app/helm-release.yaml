apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld
  namespace: palworld
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.14.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: palworld
  values:
    credentials:
        s3:
            accessKey: ${BACKUP_S3_ACCESS_KEY}
            bucket: ${BACKUP_S3_BUCKET}
            encrKey: ${BACKUP_RESTIC_PASSWORD}
            secretKey: ${BACKUP_S3_SECRET_KEY}
            type: s3
            url: ${BACKUP_S3_ENDPOINT}
    image:
      repository: ghcr.io/thijsvanloef/palworld-server-docker
      tag: v2.7.0
      pullPolicy: IfNotPresent
    service:
      main:
        type: LoadBalancer
        enabled: true
        ports:
          main:
            enabled: true
            protocol: udp
            port: 8211
            targetPort: 8211
          query:
            enabled: true
            protocol: udp
            port: 27015
            targetPort: 27015

      rcon:
        enabled: true
        ports:
          rcon:
            enabled: true
            protocol: tcp
            port: 25575
            targetPort: 25575

      api:
        enabled: true
        ports:
          api:
            enabled: true
            protocol: tcp
            port: 8212
            targetPort: 8212

    workload:
      main:
        podSpec:

          containers:
            main:

              env:

                # Server settings
                SERVER_NAME: "CrypticTest"
                SERVER_DESCRIPTION: "A Palworld Server running in Kubernetes"

                SERVER_PASSWORD: "${PALWORLD_SERVER_PASSWORD}"
                ADMIN_PASSWORD: "${PALWORLD_ADMIN_PASSWORD}"

                COMMUNITY: "true"

                # RCON
                RCON_ENABLED: "false"

                # REST API
                REST_API_ENABLED: "true"
                REST_API_PORT: "8212"


                # Auto pause
                AUTO_PAUSE_ENABLED: "true"
                AUTO_PAUSE_TIMEOUT_EST: "60"
                AUTO_PAUSE_LOG: "true"
                AUTO_PAUSE_DEBUG: "false"

                # Performance
                ENABLE_PERF_THREADING_ARGS: true

                # Updates
                UPDATE_ON_BOOT: "true"
                AUTO_UPDATE_ENABLED: "false"
                AUTO_UPDATE_CRON_EXPRESSION: "0 * * * *"
                AUTO_UPDATE_WARN_MINUTES: "30"

                # Reboot
                AUTO_REBOOT_ENABLED: "false"
                AUTO_REBOOT_EVEN_IF_PLAYERS_ONLINE: "false"
                AUTO_REBOOT_WARN_MINUTES: "5"
                AUTO_REBOOT_CRON_EXPRESSION: "0 0 * * *"

              resources:
                requests:
                  cpu: 2
                  memory: 6Gi
                limits:
                  cpu: 6
                  memory: 24Gi

              securityContext:
                runAsUser: 0
                runAsGroup: 0
                runAsNonRoot: false
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: true
                capabilities:
                  add:
                    - NET_RAW

              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false

    persistence:
      palworld:
        enabled: true
        mountPath: /palworld/
        volsync:
            - credentials: s3
              type: restic
              name: config
              dest:
                enabled: true
                cacheCapacity: 20Gi
              src:
                enabled: true
                cacheCapacity: 20Gi
                trigger:
                  schedule: 0 3 * * *

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: pal.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix