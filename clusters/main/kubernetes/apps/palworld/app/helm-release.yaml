apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld
  namespace: palworld
spec:
  interval: 15m
  chart:
    spec:
      chart: palworld
      version: 7.6.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: palworld
  values:
    palworld:
      steam:
        id: "2394010"
        username: ""
        password: ""
        validate: false
      game:
        ServerName: "My Palworld Server"
        ServerDescription: "A Palworld Server running in Kubernetes"
        ServerPassword: "${PALWORLD_SERVER_PASSWORD}"
        AdminPassword: "${PALWORLD_ADMIN_PASSWORD}"
        bUseAuth: true
        # PublicIP: "my public IP"
        # AllowConnectPlatform: "Steam|Xbox"
      update_public_ip: false
      #params:
      #  - -publiclobby
      params_extra:
        - -useperfthreads
        - -NoAsyncLoadingThread
        - -UseMultithreadForDS
      backup:
        enabled: true
        interval: 120
        to_keep: 12

    service:
      main:
        type: LoadBalancer
        ports:
          main:
            protocol: udp
            port: 8211
      dashboard:
        enabled: true
        type: ClusterIP
        ports:
          dashboard:
            enabled: true
            port: 3000
            protocol: http
            targetPort: 3000
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: pal.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
      dashboard:
        enabled: true
        ingressClassName: internal
        annotations:
          nginx.ingress.kubernetes.io/auth-method: "GET"
          nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local:9091/api/verify"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.${DOMAIN_0}?rm=$request_method"
          nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Groups,Remote-Email"
        hosts:
          - host: pal-admin.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix

    workload:
      main:
        podSpec:
          containers:
            dashboard:
              enabled: true

              image:
                repository: ghcr.io/rnz01/palworld-server-dashboard
                tag: latest

              env:
                NODE_ENV: production
                HOSTNAME: 0.0.0.0
                PORT: "3000"

                PANEL_AUTH_FILE: /app/data/panel-auth.json
                PANEL_INITIAL_ADMIN_PASSWORD: "${PALWORLD_DASHBOARD_PASSWORD}"

                PALWORLD_REST_URL: http://127.0.0.1:8212
                PALWORLD_ADMIN_PASSWORD: "${PALWORLD_ADMIN_PASSWORD}"

              probes:
                startup:
                  enabled: false

                readiness:
                  enabled: true
                  type: http
                  path: /
                  port: 3000

                liveness:
                  enabled: true
                  type: http
                  path: /
                  port: 3000

    persistence:
      dashboard-data:
        enabled: true
        size: 2Gi
        targetSelector:
          main:
            dashboard:
              mountPath: /app/data
    addons:
        codeserver:
            enabled: true
            ingress:
                enabled: true
                hosts:
                  - host: pal-codeserver.${DOMAIN_0}