apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: tailscale
    namespace: tailscale
spec:
    interval: 15m
    chart:
        spec:
            chart: tailscale
            version: 9.1.4
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: tailscale
    values:
        global:
            stopAll: true
        tailscale:
            authkey: ${TAILSCALE_AUTHKEY}
            routes: ${SUBNET}