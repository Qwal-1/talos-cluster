apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: upsnap
    namespace: upsnap
    labels:
        pod-security.kubernetes.io/enforce: "privileged"
        pod-security.kubernetes.io/audit: "privileged"
        pod-security.kubernetes.io/warn: "privileged"
spec:
    interval: 15m
    chart:
        spec:
            chart: app-template
            version: 14.2.2
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: upsnap
    values:
        image:
            repository: ghcr.io/seriousm4x/upsnap
            tag: latest
        credentials:
            minio:
                accessKey: ${MINIO_ACCESSKEY}
                bucket: ${MINIO_BUCKET}
                encrKey: ${MINIO_ENCRKEY}
                secretKey: ${MINIO_SECRETKEY}
                type: s3
                url: ${MINIO_URL}
        ingress:
            main:
                enabled: true
                hosts:
                    - host: up.${DOMAIN_0}
                      paths:
                        - path: /
                          pathType: Prefix
        podOptions:
            hostNetwork: true
        securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
        service:
            main:
                enabled: true
                ports:
                    main:
                        enabled: true
                        port: 9790
                        protocol: http
                        targetPort: 8090
                type: ClusterIP